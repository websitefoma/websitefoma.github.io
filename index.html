<!DOCTYPE html>
<html lang="ru" data-bs-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Twitch Раздача — розыгрыши в чате</title>

<!-- Bootstrap 5 CSS с CDN -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<!-- Bootstrap Icons с CDN -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<style>
  /* ============ Общая тема: тёмная, в фирменных цветах Twitch ============ */
  :root{
    --twitch-purple: #9146FF;
    --twitch-purple-dark: #5A2FA8;
    --twitch-glow: #bf94ff;
    --panel-bg: #17141f;
    --panel-bg-2: #1f1b2b;
    --border-soft: #322a44;
  }

  body{
    background: radial-gradient(circle at top left, #241a38 0%, #0e0b16 55%, #0a0810 100%);
    background-attachment: fixed;
    color: #e9e6f2;
    font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    min-height: 100vh;
  }

  .app-header{
    background: linear-gradient(90deg, var(--twitch-purple-dark), var(--twitch-purple));
    border-bottom: 1px solid var(--border-soft);
    box-shadow: 0 4px 20px rgba(145,70,255,.35);
  }
  .app-header h1{
    font-weight: 800;
    letter-spacing: .5px;
  }
  .app-header .subtitle{
    color: #ecdcff;
    opacity:.85;
    font-size: .95rem;
  }

  .panel{
    background: var(--panel-bg);
    border: 1px solid var(--border-soft);
    border-radius: 14px;
    box-shadow: 0 8px 24px rgba(0,0,0,.35);
  }
  .panel-header{
    background: var(--panel-bg-2);
    border-bottom: 1px solid var(--border-soft);
    border-radius: 14px 14px 0 0;
    font-weight: 700;
    letter-spacing:.3px;
  }

  .status-dot{
    width: 12px; height:12px; border-radius:50%;
    display:inline-block; margin-right:8px;
    background:#6c757d;
    box-shadow: 0 0 0 rgba(108,117,125,.4);
  }
  .status-dot.online{
    background:#2ecc71;
    box-shadow: 0 0 10px 2px rgba(46,204,113,.6);
    animation: pulse 1.6s infinite;
  }
  .status-dot.error{
    background:#e74c3c;
    box-shadow: 0 0 10px 2px rgba(231,76,60,.6);
  }
  @keyframes pulse{
    0%{ box-shadow:0 0 0 0 rgba(46,204,113,.6);}
    70%{ box-shadow:0 0 0 8px rgba(46,204,113,0);}
    100%{ box-shadow:0 0 0 0 rgba(46,204,113,0);}
  }

  .participant-chip{
    display:flex; align-items:center; justify-content:space-between;
    background: var(--panel-bg-2);
    border:1px solid var(--border-soft);
    border-radius:10px;
    padding:.45rem .75rem;
    margin-bottom:.4rem;
    font-size:.92rem;
    transition: transform .1s ease;
  }
  .participant-chip:hover{
    transform: translateX(2px);
    border-color: var(--twitch-purple);
  }
  .participant-chip.locked{
    opacity:.55;
  }

  .winner-item{
    background: var(--panel-bg-2);
    border:1px solid var(--border-soft);
    border-left:3px solid var(--twitch-purple);
    border-radius:8px;
    padding:.55rem .8rem;
    margin-bottom:.45rem;
  }
  .winner-item .win-name{
    font-weight:700;
    color: var(--twitch-glow);
  }

  #debugLog{
    background:#0b0910;
    border:1px solid var(--border-soft);
    border-radius:10px;
    height: 180px;
    overflow-y:auto;
    font-family: "Consolas","Courier New",monospace;
    font-size:.8rem;
    padding:.6rem;
  }
  #debugLog .log-line{ margin-bottom:2px; }
  .log-info{ color:#8ecae6; }
  .log-success{ color:#8ee08e; }
  .log-warn{ color:#f0c96b; }
  .log-error{ color:#f28b82; }

  .counter-badge{
    font-size:1rem;
    background: var(--twitch-purple);
  }

  .btn-twitch{
    background: var(--twitch-purple);
    border-color: var(--twitch-purple);
    color:#fff;
    font-weight:600;
  }
  .btn-twitch:hover{
    background: var(--twitch-purple-dark);
    border-color: var(--twitch-purple-dark);
    color:#fff;
  }

  .winner-reveal{
    font-size:1.4rem;
    font-weight:800;
    color:#fff;
    background: linear-gradient(90deg, var(--twitch-purple-dark), var(--twitch-purple));
    border-radius:12px;
    padding:1rem;
    text-align:center;
    box-shadow: 0 0 30px rgba(145,70,255,.5);
    display:none;
    transition: all .2s ease;
  }
  .winner-reveal.show{
    display:block;
    animation: pop .4s ease;
  }
  .winner-reveal.russian{
    background: linear-gradient(90deg, #8b0000, #cc0000);
    box-shadow: 0 0 40px rgba(200,0,0,.7);
  }
  @keyframes pop{
    0%{ transform: scale(.85); opacity:0; }
    100%{ transform: scale(1); opacity:1; }
  }

  .form-label small{ color:#a99ec9; }

  ::-webkit-scrollbar{ width:8px; }
  ::-webkit-scrollbar-thumb{ background: var(--twitch-purple-dark); border-radius:4px; }
</style>
</head>
<body>

<!-- ============ Шапка приложения ============ -->
<header class="app-header py-3 mb-4">
  <div class="container">
    <h1 class="mb-0"><i class="bi bi-controller"></i> Twitch Раздача</h1>
    <div class="subtitle">Розыгрыши прямо в чате — без бэкенда, всё в вашем браузере</div>
  </div>
</header>

<div class="container pb-5">
  <div class="row g-4">

    <!-- ============================================================ -->
    <!-- ЛЕВАЯ КОЛОНКА (теперь здесь всё)                              -->
    <!-- ============================================================ -->
    <div class="col-lg-12">

      <!-- Панель подключения -->
      <div class="panel mb-4">
        <div class="panel-header px-3 py-2"><i class="bi bi-plug"></i> Подключение к чату</div>
        <div class="p-3">

          <div class="mb-3">
            <label class="form-label" for="channelInput">Канал (никнейм стримера)</label>
            <input type="text" class="form-control" id="channelInput" placeholder="например: mustashh">
          </div>

          <div class="mb-3">
            <label class="form-label" for="keywordInput">Ключевое слово для участия</label>
            <input type="text" class="form-control" id="keywordInput" value="розыгрыш">
          </div>

          <div class="mb-3">
            <label class="form-label" for="cooldownInput">
              Кулдаун победителей (в днях)
              <small class="d-block">Игроки, выигравшие менее N дней назад, не участвуют</small>
            </label>
            <input type="number" min="0" class="form-control" id="cooldownInput" value="7">
          </div>

          <div class="d-flex gap-2 flex-wrap">
            <button class="btn btn-twitch" id="connectBtn"><i class="bi bi-broadcast"></i> Подключиться</button>
            <button class="btn btn-outline-danger" id="disconnectBtn" disabled><i class="bi bi-x-circle"></i> Отключиться</button>
          </div>

          <hr>

          <div class="d-flex align-items-center">
            <span class="status-dot" id="statusDot"></span>
            <span id="statusText">Не подключено</span>
          </div>
        </div>
      </div>

      <!-- Панель участников -->
      <div class="panel mb-4">
        <div class="panel-header px-3 py-2 d-flex justify-content-between align-items-center">
          <span><i class="bi bi-people"></i> Участники</span>
          <span class="badge counter-badge" id="participantsCount">0</span>
        </div>
        <div class="p-3">

          <div class="winner-reveal mb-3" id="winnerReveal"></div>

          <!-- Выбор типа игры -->
          <div class="mb-3">
            <label class="form-label" for="gameTypeSelect">Тип розыгрыша</label>
            <select class="form-select" id="gameTypeSelect">
              <option value="default">🎲 Обычный розыгрыш</option>
              <option value="russian">🔫 Русская рулетка</option>
            </select>
          </div>

          <div class="d-flex gap-2 mb-3 flex-wrap">
            <button class="btn btn-twitch" id="drawBtn"><i class="bi bi-shuffle"></i> Выбрать победителя!</button>
            <button class="btn btn-outline-secondary" id="clearParticipantsBtn"><i class="bi bi-eraser"></i> Очистить участников</button>
          </div>

          <div id="participantsList" style="max-height:320px; overflow-y:auto;">
            <div class="text-secondary small" id="participantsEmpty">Пока никто не написал ключевое слово в чате.</div>
          </div>
        </div>
      </div>

      <!-- Панель истории победителей -->
      <div class="panel mb-4">
        <div class="panel-header px-3 py-2 d-flex justify-content-between align-items-center">
          <span><i class="bi bi-trophy"></i> История победителей</span>
          <button class="btn btn-sm btn-outline-danger" id="clearHistoryBtn"><i class="bi bi-trash"></i> Очистить</button>
        </div>
        <div class="p-3">
          <div id="historyList" style="max-height:400px; overflow-y:auto;">
            <div class="text-secondary small" id="historyEmpty">История розыгрышей пока пуста.</div>
          </div>
        </div>
      </div>

      <!-- Панель отладки -->
      <div class="panel">
        <div class="panel-header px-3 py-2"><i class="bi bi-bug"></i> Лог отладки</div>
        <div class="p-3">
          <div id="debugLog"></div>
        </div>
      </div>

    </div>
    <!-- конец левой колонки -->

  </div>
</div>

<!-- Bootstrap 5 JS Bundle (на случай интерактивных компонентов Bootstrap) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
/* =========================================================================
   TWITCH РАЗДАЧА — логика приложения
   Всё состояние (участники) хранится в памяти вкладки,
   вся история побед — в localStorage браузера.
   ========================================================================= */

// ---------- Константы localStorage ----------
const LS_HISTORY_KEY = 'twitchRaffle_history'; // ключ для истории побед

// ---------- Состояние приложения ----------
let tmiClient = null;                 // текущий клиент tmi.js
let currentChannel = '';              // канал, к которому подключены (в нижнем регистре, без #)
let currentKeyword = '';              // ключевое слово для участия (в нижнем регистре)
let participants = new Map();         // username -> { displayName }
let autoRefreshTimer = null;          // таймер автообновления истории (каждые 5 сек)

// ---------- Ссылки на DOM-элементы ----------
const channelInput = document.getElementById('channelInput');
const keywordInput = document.getElementById('keywordInput');
const cooldownInput = document.getElementById('cooldownInput');
const connectBtn = document.getElementById('connectBtn');
const disconnectBtn = document.getElementById('disconnectBtn');
const statusDot = document.getElementById('statusDot');
const statusText = document.getElementById('statusText');
const participantsList = document.getElementById('participantsList');
const participantsEmpty = document.getElementById('participantsEmpty');
const participantsCount = document.getElementById('participantsCount');
const drawBtn = document.getElementById('drawBtn');
const clearParticipantsBtn = document.getElementById('clearParticipantsBtn');
const winnerReveal = document.getElementById('winnerReveal');
const historyList = document.getElementById('historyList');
const historyEmpty = document.getElementById('historyEmpty');
const clearHistoryBtn = document.getElementById('clearHistoryBtn');
const debugLog = document.getElementById('debugLog');
const gameTypeSelect = document.getElementById('gameTypeSelect');

// =========================================================================
// ЛОГ ОТЛАДКИ
// =========================================================================

/**
 * Добавляет строку в панель отладки.
 * @param {string} message - текст сообщения
 * @param {'info'|'success'|'warn'|'error'} level - уровень важности
 */
function log(message, level = 'info') {
  const time = new Date().toLocaleTimeString('ru-RU');
  const line = document.createElement('div');
  line.className = `log-line log-${level}`;
  line.textContent = `[${time}] ${message}`;
  debugLog.appendChild(line);
  debugLog.scrollTop = debugLog.scrollHeight;
}

// Перехватываем ЛЮБЫЕ необработанные ошибки JS и выводим их в панель отладки.
// Это нужно, чтобы пользователь видел причину сбоя, даже не открывая консоль браузера (F12).
window.addEventListener('error', (event) => {
  log('Необработанная ошибка: ' + (event.message || event.error), 'error');
});
window.addEventListener('unhandledrejection', (event) => {
  log('Необработанный отказ промиса: ' + (event.reason && event.reason.message ? event.reason.message : event.reason), 'error');
});

// =========================================================================
// РАБОТА С ИСТОРИЕЙ ПОБЕД (localStorage)
// =========================================================================

/**
 * Возвращает всю историю побед из localStorage.
 * @returns {Array<{username:string, displayName:string, keyword:string, channel:string, timestamp:number}>}
 */
function getHistory() {
  try {
    const raw = localStorage.getItem(LS_HISTORY_KEY);
    return raw ? JSON.parse(raw) : [];
  } catch (e) {
    log('Ошибка чтения истории из localStorage: ' + e.message, 'error');
    return [];
  }
}

/**
 * Сохраняет полную историю побед в localStorage.
 */
function saveHistory(history) {
  try {
    localStorage.setItem(LS_HISTORY_KEY, JSON.stringify(history));
  } catch (e) {
    log('Ошибка записи истории в localStorage: ' + e.message, 'error');
  }
}

/**
 * Добавляет новую запись о победителе в историю (в начало списка).
 */
function addWinnerToHistory(username, displayName, keyword, channel) {
  const history = getHistory();
  history.unshift({
    username: username.toLowerCase(),
    displayName,
    keyword,
    channel: channel.toLowerCase(),
    timestamp: Date.now()
  });
  saveHistory(history);
}

/**
 * Находит дату последнего выигрыша пользователя на ТЕКУЩЕМ канале.
 * @returns {number|null} timestamp последней победы или null, если побед не было
 */
function getLastWinTimestamp(username) {
  const history = getHistory();
  const entry = history.find(
    h => h.username === username.toLowerCase() && h.channel === currentChannel.toLowerCase()
  );
  return entry ? entry.timestamp : null;
}

/**
 * Проверяет, находится ли пользователь на кулдауне (относительно текущей даты).
 */
function isOnCooldown(username) {
  const cooldownDays = parseFloat(cooldownInput.value) || 0;
  if (cooldownDays <= 0) return false;

  const lastWin = getLastWinTimestamp(username);
  if (!lastWin) return false;

  const msPassed = Date.now() - lastWin;
  const daysPassed = msPassed / (1000 * 60 * 60 * 24);
  return daysPassed < cooldownDays;
}

/**
 * Форматирует timestamp в читаемую дату (ДД.ММ.ГГГГ ЧЧ:ММ).
 */
function formatDate(timestamp) {
  const d = new Date(timestamp);
  return d.toLocaleString('ru-RU', {
    day: '2-digit', month: '2-digit', year: 'numeric',
    hour: '2-digit', minute: '2-digit'
  });
}

/**
 * Отрисовывает панель истории победителей (последние 20 записей).
 */
function renderHistory() {
  const history = getHistory().slice(0, 20);

  if (history.length === 0) {
    historyEmpty.style.display = 'block';
    historyList.querySelectorAll('.winner-item').forEach(el => el.remove());
    return;
  }

  historyEmpty.style.display = 'none';
  historyList.querySelectorAll('.winner-item').forEach(el => el.remove());

  history.forEach(entry => {
    const item = document.createElement('div');
    item.className = 'winner-item';
    item.innerHTML = `
      <div class="win-name"><i class="bi bi-trophy-fill"></i> ${escapeHtml(entry.displayName)}</div>
      <div class="small text-secondary">
        Канал: ${escapeHtml(entry.channel)} · Ключевое слово: «${escapeHtml(entry.keyword)}»
      </div>
      <div class="small text-secondary">${formatDate(entry.timestamp)}</div>
    `;
    historyList.appendChild(item);
  });
}

/**
 * Экранирует HTML-спецсимволы, чтобы никнеймы из чата нельзя было
 * использовать для внедрения произвольной разметки (защита от XSS).
 */
function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// =========================================================================
// РАБОТА СО СПИСКОМ УЧАСТНИКОВ
// =========================================================================

/**
 * Отрисовывает текущий список участников розыгрыша.
 */
function renderParticipants() {
  participantsCount.textContent = participants.size;

  if (participants.size === 0) {
    participantsEmpty.style.display = 'block';
    participantsList.querySelectorAll('.participant-chip').forEach(el => el.remove());
    return;
  }

  participantsEmpty.style.display = 'none';
  participantsList.querySelectorAll('.participant-chip').forEach(el => el.remove());

  participants.forEach((data, username) => {
    const locked = isOnCooldown(username);
    const lastWin = getLastWinTimestamp(username);

    const chip = document.createElement('div');
    chip.className = 'participant-chip' + (locked ? ' locked' : '');
    chip.title = lastWin
      ? `Последний выигрыш: ${formatDate(lastWin)}`
      : 'Ранее не выигрывал(а) на этом канале';

    chip.innerHTML = `
      <span>${locked ? '<i class="bi bi-lock-fill me-1"></i>' : '<i class="bi bi-person-fill me-1"></i>'}${escapeHtml(data.displayName)}</span>
      <span class="small text-secondary">${lastWin ? formatDate(lastWin) : '—'}</span>
    `;
    participantsList.appendChild(chip);
  });
}

// =========================================================================
// ПОДКЛЮЧЕНИЕ К ЧАТУ TWITCH (через tmi.js, анонимный вход justinfan)
// =========================================================================

function setStatus(state, text) {
  statusDot.className = 'status-dot' + (state === 'online' ? ' online' : state === 'error' ? ' error' : '');
  statusText.textContent = text;
}

/**
 * Подключение к чату указанного канала в качестве анонимного зрителя.
 */
async function connectToChat() {
  const channel = channelInput.value.trim().toLowerCase().replace(/^#/, '');
  const keyword = keywordInput.value.trim().toLowerCase();

  if (!channel) {
    log('Укажите никнейм канала перед подключением.', 'warn');
    return;
  }
  if (!keyword) {
    log('Укажите ключевое слово перед подключением.', 'warn');
    return;
  }

  currentChannel = channel;
  currentKeyword = keyword;

  // Случайный анонимный ник вида justinfanXXXXX — стандартный способ
  // подключиться к чату Twitch только на чтение, без авторизации.
  const anonNick = 'justinfan' + Math.floor(10000 + Math.random() * 90000);

  // Проверка на случай, если встроенный код библиотеки почему-то не выполнился
  // (например, файл был случайно обрезан при копировании/загрузке).
  if (typeof tmi === 'undefined') {
    setStatus('error', 'Библиотека tmi.js не загрузилась');
    log('Встроенный код tmi.js не выполнился. Проверьте, что HTML-файл скопирован полностью и не был обрезан.', 'error');
    return;
  }

  try {
    tmiClient = new tmi.Client({
      options: { debug: false },
      connection: { reconnect: true, secure: true },
      identity: { username: anonNick },
      channels: [channel]
    });
  } catch (err) {
    setStatus('error', 'Ошибка создания клиента');
    log('Не удалось создать клиент tmi.js: ' + err, 'error');
    return;
  }

  // Таймаут: если через 10 секунд ни "connected", ни "disconnected" не сработали —
  // значит соединение "подвисло" (обычно из-за блокировки WebSocket фаерволом/прокси/расширением).
  const connectTimeout = setTimeout(() => {
    if (statusText.textContent === 'Подключение...') {
      setStatus('error', 'Нет ответа от Twitch');
      log('Подключение не завершилось за 10 секунд. Обычно это блокировка WebSocket (wss://) фаерволом, прокси, VPN или расширением-блокировщиком. Попробуйте отключить блокировщики рекламы или открыть страницу в режиме инкогнито.', 'error');
    }
  }, 10000);

  // Событие: сообщение получено
  tmiClient.on('message', (chan, tags, message, self) => {
    if (self) return;

    const text = message.trim().toLowerCase();
    log(`Сообщение от ${tags['display-name'] || tags.username}: "${message}"`, 'info');

    if (text.includes(currentKeyword)) {
      const username = (tags.username || '').toLowerCase();
      const displayName = tags['display-name'] || tags.username;

      if (!username) return;

      if (!participants.has(username)) {
        participants.set(username, { displayName });
        log(`Участник добавлен: ${displayName}`, 'success');
        renderParticipants();
      }
    }
  });

  // Событие: успешное подключение
  tmiClient.on('connected', (address, port) => {
    clearTimeout(connectTimeout);
    setStatus('online', `Подключено к каналу #${channel}`);
    log(`Успешно подключено к чату #${channel} (${address}:${port})`, 'success');
    connectBtn.disabled = true;
    disconnectBtn.disabled = false;
    channelInput.disabled = true;
    keywordInput.disabled = true;
  });

  // Событие: отключение
  tmiClient.on('disconnected', (reason) => {
    clearTimeout(connectTimeout);
    setStatus('offline', 'Отключено');
    log(`Соединение закрыто: ${reason || 'без причины'}`, 'warn');
    connectBtn.disabled = false;
    disconnectBtn.disabled = true;
    channelInput.disabled = false;
    keywordInput.disabled = false;
  });

  try {
    setStatus('', 'Подключение...');
    log(`Подключаюсь к каналу #${channel} как ${anonNick}...`, 'info');
    await tmiClient.connect();
  } catch (err) {
    clearTimeout(connectTimeout);
    setStatus('error', 'Ошибка подключения');
    log('Ошибка подключения: ' + err, 'error');
  }
}

/**
 * Отключение от чата.
 */
async function disconnectFromChat() {
  if (!tmiClient) return;
  try {
    await tmiClient.disconnect();
  } catch (err) {
    log('Ошибка при отключении: ' + err, 'error');
  }
  tmiClient = null;
}

// =========================================================================
// РОЗЫГРЫШ ПОБЕДИТЕЛЯ С АНИМАЦИЕЙ РУЛЕТКИ
// =========================================================================

function drawWinner() {
  if (participants.size === 0) {
    log('Нет участников для розыгрыша.', 'warn');
    winnerReveal.textContent = 'Список участников пуст — сначала соберите участников в чате.';
    winnerReveal.classList.add('show');
    winnerReveal.classList.remove('russian');
    return;
  }

  // Отсеиваем участников на кулдауне
  const eligible = [...participants.entries()].filter(([username]) => !isOnCooldown(username));

  if (eligible.length === 0) {
    log('Все участники на кулдауне — розыгрыш невозможен.', 'warn');
    winnerReveal.textContent = 'Все участники сейчас на кулдауне 🔒 — победителя выбрать нельзя.';
    winnerReveal.classList.add('show');
    winnerReveal.classList.remove('russian');
    return;
  }

  // Блокируем кнопку на время анимации
  drawBtn.disabled = true;

  const gameType = gameTypeSelect.value;
  const reveal = winnerReveal;
  reveal.classList.add('show');
  reveal.classList.remove('russian');

  // Массив имён для прокрутки
  const names = eligible.map(([username, data]) => data.displayName);

  // Длительность анимации (мс)
  const totalDuration = 4000;
  const startTime = Date.now();

  // Рекурсивная функция шага анимации
  function step() {
    const elapsed = Date.now() - startTime;
    const progress = Math.min(elapsed / totalDuration, 1);

    // Случайное имя из списка
    const randomName = names[Math.floor(Math.random() * names.length)];
    reveal.innerHTML = `🎲 ${escapeHtml(randomName)}`;

    if (progress < 1) {
      // Замедление: интервал увеличивается от 50 до ~350 мс
      const delay = 50 + progress * 300;
      setTimeout(step, delay);
    } else {
      // Анимация завершена — выбираем победителя
      const winnerIndex = Math.floor(Math.random() * eligible.length);
      const [winnerUsername, winnerData] = eligible[winnerIndex];

      // Сохраняем победителя в историю
      addWinnerToHistory(winnerUsername, winnerData.displayName, currentKeyword, currentChannel || 'неизвестно');

      // Отображаем результат в зависимости от выбранной игры
      if (gameType === 'russian') {
        reveal.classList.add('russian');
        reveal.innerHTML = `💥 Русская рулетка! Победитель: <strong>${escapeHtml(winnerData.displayName)}</strong> 💥`;
      } else {
        reveal.innerHTML = `🎉 Победитель: <strong>${escapeHtml(winnerData.displayName)}</strong> 🎉`;
      }

      // Очищаем список участников
      participants.clear();
      renderParticipants();
      renderHistory();
      drawBtn.disabled = false;
      log(`Победитель: ${winnerData.displayName} (${gameType})`, 'success');
    }
  }

  // Запускаем анимацию
  step();
}

// =========================================================================
// ОБРАБОТЧИКИ КНОПОК
// =========================================================================

connectBtn.addEventListener('click', connectToChat);
disconnectBtn.addEventListener('click', disconnectFromChat);
drawBtn.addEventListener('click', drawWinner);

clearParticipantsBtn.addEventListener('click', () => {
  participants.clear();
  renderParticipants();
  winnerReveal.classList.remove('show');
  winnerReveal.classList.remove('russian');
  log('Список участников очищен вручную.', 'info');
});

clearHistoryBtn.addEventListener('click', () => {
  if (!confirm('Удалить всю историю победителей без возможности восстановления?')) return;
  saveHistory([]);
  renderHistory();
  log('История победителей полностью очищена.', 'warn');
});

// =========================================================================
// АВТООБНОВЛЕНИЕ ИСТОРИИ И СПИСКА УЧАСТНИКОВ (каждые 5 секунд)
// =========================================================================

function startAutoRefresh() {
  autoRefreshTimer = setInterval(() => {
    renderHistory();
    renderParticipants(); // чтобы значки 🔒 обновлялись по мере истечения кулдауна
  }, 5000);
}

// =========================================================================
// ИНИЦИАЛИЗАЦИЯ ПРИЛОЖЕНИЯ
// =========================================================================

window.addEventListener('DOMContentLoaded', () => {
  renderHistory();
  renderParticipants();
  startAutoRefresh();
  log('Приложение готово к работе. Введите канал и ключевое слово, затем нажмите «Подключиться».', 'info');
});
</script>
